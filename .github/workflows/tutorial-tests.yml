name: Tutorial Tests

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  run_tutorial_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install SCOPE with dev extras
        run: pip install -e ".[dev]"

      - name: Clear tutorial outputs
        run: python -m Scope.cli.clear_tutorial_outputs

      - name: Run tutorial notebook tests
        run: pytest --nbval-lax
