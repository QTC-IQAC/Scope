name: Tutorial Tests

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:
jobs:
  run_tutorial_tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12, 3.13, 3.14]   # Add more versions if needed

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and setuptools
        run: python -m pip install --upgrade pip setuptools wheel 

      - name: Install SCOPE with dev extras
        run: pip install -e ".[dev]"

      - name: Debug Python
        run: |
          python --version
          pip list
          
      - name: Run tutorial notebook tests
        run: pytest --nbval-lax
